# Camera-ready Phase-1 smoke matrix.
# 5 cells × N=1 invocation each. Total budget cap: ~$8.
# Per DESIGN_BENCH.md §5.6 — Claude Code raw vs +sky+registry isolates the
# registry/cloud bits; sciagent verifier-ON vs verifier-OFF isolates
# mid-session verifier feedback; cross-family-verifier answers R1.
#
# Single-cell sanity run: only cc-bare is active. Uncomment the others
# after the bare cell completes cleanly and you've eyeballed the artifacts.
cells:
  - id: photonics__cc-bare__sonnet
    task: photonics
    adapter: claude_code
    adapter_config: {with_sky: false, with_registry: false}
    llm: anthropic/claude-sonnet-4-6

