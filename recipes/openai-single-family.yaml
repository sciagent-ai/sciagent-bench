# Recipe: openai-single-family
#
# Varies: provider (all four role models on OpenAI).
# Held fixed at sciagent defaults (NOT ablated in this cell):
#   - DATA gate ON, EXEC gate ON, LLM verification ON (BUT see note below)
#   - verifier is same family as main (o4-mini)
#   - registry: default catalog
#   - compute tools: loaded (unused for tasks that don't need clusters)
#
# Model picks as of 2026-05-29:
#   - gpt-4.1 family is yesterday's tier — the 2026-05-29 DBAASP smoke showed
#     gpt-4.1 giving up at the first 403 instead of inspecting the page JS for
#     the real endpoint. gpt-5.4 is the current GA equivalent of Sonnet 4.6.
#   - gpt-5.5 / gpt-5.5-Pro are newer but often tier-5+ gated; using 5.4 here.
#   - o4-mini is the cheap reasoning-tuned verifier.
#
# NOTE on verifier_model: today `sciagent run "task"` routes through
# AgentLoop directly and skips the verification gate (which lives on
# TaskOrchestrator.execute_all). This field is wired but unread until
# sciagent's verification gate fires on single-task runs too.
agent:
  model: openai/gpt-5.4
orchestrator:
  scientific_model: openai/gpt-5.4
  coding_model:     openai/gpt-5.4-mini
  fast_model:       openai/gpt-5.4-mini
  verifier_model:   openai/o4-mini
